<!DOCTYPE html>
<html lang="ru">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор QR-кодов</title>

</head>
<body>

    <div id= generator><h1 style="color: rgb(255, 0, 0);"> Генератор QR-кодов</h1> </div>
    <div id="qrkod"><h1 style="color: rgb(0, 0, 0);">QR-кодов</h1> </div>
    <input type="text" id="urlInput" placeholder="Введите ссылку">
    <br>
    <button onclick="generateQR()">Создать QR-код</button>

    <div id="result"></div>

    <script>
        function generateQR() {
            const url = document.getElementById('urlInput').value.trim();

            if (!url) {
                alert('Введите ссылку');
                return;
            }

            const qrUrl =
                `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent
(url)}`;

            document.getElementById('result').innerHTML =
                `<img src="${qrUrl}" alt="QR-код" style="position: relative; top:50px;" >`;
        }
    </script>

</body>

</body>
</html>
